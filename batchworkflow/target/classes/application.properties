spring.application.name=batch

# ---------------------------------------------------------------------------
# Operations — add one block per operation type.
# Each operation has its own HTTP endpoint, threading and XPath config.
# The operationType request parameter must match a key defined here.
# ---------------------------------------------------------------------------

batch.operations.pubmed.http.url=https://eutils.ncbi.nlm.nih.gov/entrez/eutils/efetch.fcgi?db=pubmed&id={id}&retmode=xml
batch.operations.pubmed.http.method=GET
batch.operations.pubmed.http.thread-count=5
batch.operations.pubmed.xpath.thread-count=10
batch.operations.pubmed.xpath.config=classpath:pubmed_xpaths.json
batch.operations.pubmed.mandatory-attributes=id
# No auth for pubmed (default NONE)
#batch.operations.pubmed.auth.method=NONE

batch.operations.zip.http.url=https://api.zippopotam.us/us/{id}
batch.operations.zip.http.method=GET
batch.operations.zip.http.thread-count=5
batch.operations.zip.mandatory-attributes=id
batch.operations.zip.data-extraction.type=JSON
batch.operations.zip.data-extraction.jsonata-transform=classpath:transforms/zip.jsonata
batch.operations.zip.http.header.Accept=application/json
batch.operations.zip.http.header.X-Api-Key=abc123
batch.operations.zip.http.header.X-Correlation-Id=batch-runner

