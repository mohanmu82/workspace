<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batch Runner</title>
    <script src="https://cdn.jsdelivr.net/npm/ag-grid-community@31/dist/ag-grid-community.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f4f5f7;
            color: #172b4d;
            padding: 24px;
        }

        h1 { font-size: 20px; font-weight: 600; margin-bottom: 16px; }

        .form-panel {
            background: #fff;
            border: 1px solid #dfe1e6;
            border-radius: 6px;
            padding: 16px;
            margin-bottom: 14px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 12px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .form-group.wide { grid-column: 1 / -1; }

        .form-group label {
            font-size: 11px;
            font-weight: 600;
            color: #5e6c84;
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 7px 10px;
            font-size: 14px;
            border: 1px solid #ccc;
            border-radius: 4px;
            outline: none;
            background: #fff;
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: #4c9aff;
            box-shadow: 0 0 0 2px rgba(76,154,255,0.25);
        }

        .form-group select:disabled {
            background: #f4f5f7;
            color: #a5adba;
            cursor: not-allowed;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
            font-size: 13px;
        }

        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
            margin-bottom: 12px;
        }

        .toolbar button {
            padding: 8px 18px;
            font-size: 14px;
            font-weight: 500;
            background: #0052cc;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            white-space: nowrap;
        }

        .toolbar button:hover { background: #0065ff; }
        .toolbar button:disabled { background: #a5adba; cursor: not-allowed; }

        .toolbar button.secondary {
            background: #fff;
            color: #0052cc;
            border: 1px solid #0052cc;
        }

        .toolbar button.secondary:hover { background: #e9f0ff; }
        .toolbar button.secondary:disabled { background: #fff; color: #a5adba; border-color: #a5adba; }

        .stats-bar {
            display: none;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 10px;
            font-size: 13px;
        }

        .stat {
            background: #fff;
            border: 1px solid #dfe1e6;
            border-radius: 4px;
            padding: 6px 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }

        .stat-label { color: #5e6c84; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
        .stat-value { font-size: 16px; font-weight: 600; color: #172b4d; }

        .status-bar {
            font-size: 13px;
            color: #5e6c84;
            margin-bottom: 10px;
            min-height: 18px;
        }

        .status-bar.error { color: #de350b; }

        #grid {
            width: 100%;
            height: calc(100vh - 340px);
        }

        .row-failed { background-color: #ffebe6 !important; color: #bf2600; }
        .row-failed:hover { background-color: #ffbdad !important; }

        .hidden { display: none !important; }

        .row-count-bar {
            font-size: 12px;
            color: #5e6c84;
            text-align: right;
            margin-bottom: 4px;
            min-height: 16px;
        }

        .request-preview-header {
            display: none;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
        }

        .request-preview-label {
            font-size: 11px;
            font-weight: 600;
            color: #5e6c84;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            flex: 1;
        }

        .request-preview-actions { display: flex; gap: 6px; }

        .request-preview-actions button {
            padding: 3px 10px;
            font-size: 12px;
            font-weight: 500;
            border-radius: 4px;
            cursor: pointer;
            border: 1px solid #0052cc;
            background: #fff;
            color: #0052cc;
        }

        .request-preview-actions button:hover { background: #e9f0ff; }

        .request-preview {
            display: none;
            width: 100%;
            background: #1e1e2e;
            color: #cdd6f4;
            font-family: "Cascadia Code", "Fira Code", "Consolas", monospace;
            font-size: 12px;
            border-radius: 6px;
            padding: 10px 14px;
            margin-bottom: 12px;
            border: 1px solid #2d2d3f;
            border-left: 3px solid #4c9aff;
            min-height: 80px;
            max-height: 200px;
            resize: vertical;
            overflow: auto;
            outline: none;
        }

        .ws-status { font-size: 10px; font-weight: 700; letter-spacing: 0.3px; }

        .cache-mode-bar {
            display: none;
            align-items: center;
            gap: 10px;
            background: #fff0b3;
            border: 1px solid #ffc400;
            border-radius: 4px;
            padding: 6px 14px;
            margin-bottom: 10px;
            font-size: 13px;
            font-weight: 500;
            color: #172b4d;
        }

        .cache-mode-bar button {
            padding: 4px 12px;
            font-size: 12px;
            font-weight: 500;
            border-radius: 4px;
            cursor: pointer;
            border: 1px solid #0052cc;
            background: #fff;
            color: #0052cc;
        }

        .cache-mode-bar button:hover { background: #e9f0ff; }
        .cache-mode-bar button.danger { border-color: #de350b; color: #de350b; }
        .cache-mode-bar button.danger:hover { background: #ffebe6; }

        .chart-modal-overlay {
            display: none;
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .chart-modal-overlay.open { display: flex; }

        .chart-modal-box {
            background: #fff;
            border-radius: 8px;
            padding: 20px 24px;
            width: 480px;
            max-width: 95vw;
            box-shadow: 0 8px 32px rgba(0,0,0,0.25);
        }

        .chart-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .chart-modal-header h3 { font-size: 16px; font-weight: 600; margin: 0; }

        .chart-modal-header button {
            background: none; border: none; font-size: 18px; cursor: pointer;
            color: #5e6c84; padding: 2px 6px; border-radius: 4px;
        }

        .chart-modal-header button:hover { background: #f4f5f7; }

        .pie-btn {
            padding: 0 4px;
            font-size: 11px;
            border: 1px solid #ccc;
            border-radius: 3px;
            cursor: pointer;
            background: #fff;
            color: #0052cc;
            line-height: 1.5;
            margin-left: 4px;
            flex-shrink: 0;
        }

        .pie-btn:hover { background: #e9f0ff; }
    </style>
</head>
<body>

<h1>Batch Runner</h1>

<div class="form-panel">
    <!-- Row 1: Operation + Input Source -->
    <div class="form-group">
        <label>Operation</label>
        <select id="operation" disabled onchange="onOperationChange()">
            <option value="">Loading operations...</option>
        </select>
    </div>

    <div class="form-group hidden" id="aliasGroup">
        <label>Alias</label>
        <select id="alias" onchange="onAliasChange()">
            <option value="">-- Select Alias --</option>
        </select>
    </div>

    <div class="form-group hidden" id="responseProcessorGroup">
        <label>Response Processor</label>
        <select id="responseProcessor">
            <option value="">-- None --</option>
        </select>
    </div>

    <div class="form-group">
        <label>Input Source</label>
        <select id="inputSource" onchange="onInputSourceChange()">
            <option value="FILE">FILE</option>
            <option value="REQUEST">REQUEST</option>
        </select>
    </div>

    <div class="form-group" id="inputFileGroup">
        <label>Input File Path</label>
        <input id="inputFilePath" type="text" placeholder="C:/work/data/ids.txt" />
    </div>

    <div class="form-group wide hidden" id="inputIdsGroup">
        <label>IDs / CSV rows (first line = header, delimiter auto-detected: comma or pipe)</label>
        <textarea id="requestIds" placeholder="id&#10;38791234&#10;38791235&#10;38791236"></textarea>
    </div>

    <!-- Row 2: Output + HTTP settings -->
    <div class="form-group">
        <label>Output</label>
        <select id="outputData" onchange="onOutputDataChange()">
            <option value="HTTP">HTTP Response</option>
            <option value="FILE">FILE</option>
        </select>
    </div>

    <div class="form-group hidden" id="outputFileGroup">
        <label>Output File Path</label>
        <input id="outputFilePath" type="text" placeholder="C:/work/data/output.out" />
    </div>

    <div class="form-group">
        <label>HTTP Thread Count</label>
        <input id="httpThreadCount" type="number" value="10" min="1" max="100" />
    </div>

    <div class="form-group">
        <label>HTTP Timeout (ms)</label>
        <input id="httpTimeoutMs" type="number" value="3000" min="100" step="500" />
    </div>

    <div class="form-group">
        <label>Max Rows (optional)</label>
        <input id="inputCount" type="number" placeholder="All rows" min="1" />
    </div>

    <div class="form-group">
        <label>Mode</label>
        <select id="debugMode">
            <option value="0">Normal</option>
            <option value="1">Show all (include activity metadata)</option>
            <option value="-1">Debug (skip extraction)</option>
        </select>
    </div>

    <div class="form-group">
        <label>Request Mode &nbsp;<span id="wsIndicator" class="ws-status"></span></label>
        <select id="requestMode">
            <option value="WS" selected>WS (WebSocket)</option>
            <option value="REST">REST (HTTP)</option>
        </select>
    </div>

    <div class="form-group">
        <label>Execution Mode</label>
        <select id="executionMode" onchange="onExecutionModeChange()">
            <option value="SYNC" selected>SYNC</option>
            <option value="ASYNC">ASYNC</option>
        </select>
    </div>
</div>

<div class="request-preview-header" id="requestPreviewHeader">
    <span class="request-preview-label">Last Request</span>
    <div class="request-preview-actions">
        <button onclick="validateJson()">Validate JSON</button>
        <button onclick="sendRawRequest()">Send Request</button>
    </div>
</div>
<textarea class="request-preview" id="requestPreview" spellcheck="false"></textarea>

<div class="toolbar">
    <button id="runBtn" onclick="runBatch()">Run</button>
    <button id="exportBtn" class="secondary" onclick="exportCsv()" disabled>Export CSV</button>
    <button id="expandBtn" class="secondary" onclick="expandColumns()" disabled>Expand Columns</button>
    <button id="shrinkBtn" class="secondary" onclick="shrinkColumns()" disabled>Shrink Columns</button>
    <button id="copyJsonBtn" class="secondary" onclick="copyJson()" disabled>Copy JSON</button>
    <button id="clearBtn" class="secondary" onclick="clearGrid()" disabled>Clear</button>
    <button id="showOpsBtn" class="secondary" onclick="showAllOperations()">Show All Operations</button>
    <button id="showCachesBtn" class="secondary" onclick="loadCacheNames()">Caches</button>
</div>

<div id="cacheModeBar" class="cache-mode-bar">
    <span id="cacheModeLabel">Caches</span>
    <button id="clearCacheBtn" onclick="clearSelectedCache()" class="danger" style="display:none">Clear Cache</button>
    <button onclick="loadCacheNames()" id="backToCachesBtn" style="display:none">&#8592; All Caches</button>
</div>

<div id="statusBar" class="status-bar"></div>

<div id="statsBar" class="stats-bar">
    <div class="stat"><span class="stat-label">Method</span><span id="statMethod" class="stat-value">—</span></div>
    <div class="stat"><span class="stat-label">Threads</span><span id="statThreadCount" class="stat-value">—</span></div>
    <div class="stat"><span class="stat-label">Min</span><span id="statMin" class="stat-value">—</span></div>
    <div class="stat"><span class="stat-label">Avg</span><span id="statAvg" class="stat-value">—</span></div>
    <div class="stat"><span class="stat-label">Max</span><span id="statMax" class="stat-value">—</span></div>
    <div class="stat"><span class="stat-label">Time Taken</span><span id="statTimeTaken" class="stat-value">—</span></div>
    <div class="stat"><span class="stat-label">Response Size</span><span id="statResponseSize" class="stat-value">—</span></div>
    <div class="stat"><span class="stat-label">Timestamp</span><span id="statTimestamp" class="stat-value">—</span></div>
    <div class="stat" style="max-width:320px"><span class="stat-label">Batch UUID</span><span id="statUuid" class="stat-value" style="font-size:11px;word-break:break-all">—</span></div>
</div>

<div id="rowCountBar" class="row-count-bar"></div>
<div id="grid" class="ag-theme-alpine"></div>

<div id="chartModal" class="chart-modal-overlay" onclick="onChartOverlayClick(event)">
    <div class="chart-modal-box">
        <div class="chart-modal-header">
            <h3 id="chartTitle"></h3>
            <button onclick="closeChart()">✕</button>
        </div>
        <canvas id="pieCanvas"></canvas>
    </div>
</div>

<script>
    // -------------------------------------------------------------------------
    // Custom ag-Grid header component — adds a pie chart button to every column
    // -------------------------------------------------------------------------

    class PieHeaderComp {
        init(params) {
            this.params = params;
            this.eGui = document.createElement('div');
            this.eGui.style.cssText = 'display:flex;align-items:center;width:100%;gap:2px;overflow:hidden';

            // Clickable sort area: label + sort direction indicator
            const sortArea = document.createElement('span');
            sortArea.style.cssText = 'flex:1;display:flex;align-items:center;min-width:0;overflow:hidden;cursor:pointer;user-select:none';
            sortArea.addEventListener('click', e => {
                if (params.enableSorting) params.progressSort(e.shiftKey);
            });

            this.labelEl = document.createElement('span');
            this.labelEl.style.cssText = 'overflow:hidden;text-overflow:ellipsis;white-space:nowrap';
            this.labelEl.textContent = params.displayName;

            this.sortEl = document.createElement('span');
            this.sortEl.style.cssText = 'flex-shrink:0;font-size:10px;margin-left:2px;color:#5e6c84';

            sortArea.appendChild(this.labelEl);
            sortArea.appendChild(this.sortEl);
            this.eGui.appendChild(sortArea);

            // Filter menu button (▽) — only when column menu is enabled
            if (params.enableMenu) {
                const filterBtn = document.createElement('button');
                filterBtn.className = 'pie-btn';
                filterBtn.title = 'Filter';
                filterBtn.innerHTML = '&#9661;';
                filterBtn.style.fontSize = '10px';
                filterBtn.addEventListener('click', e => {
                    e.stopPropagation();
                    params.showColumnMenu(filterBtn);
                });
                this.eGui.appendChild(filterBtn);
            }

            // Pie chart button
            const pieBtn = document.createElement('button');
            pieBtn.className = 'pie-btn';
            pieBtn.title = `Chart: ${params.displayName}`;
            pieBtn.textContent = '◑';
            pieBtn.addEventListener('click', e => {
                e.stopPropagation();
                showPieChart(params.column.getColId(), params.displayName);
            });
            this.eGui.appendChild(pieBtn);

            // Keep sort arrow in sync with column sort state
            this._onSortChanged = () => this._updateSort();
            params.column.addEventListener('sortChanged', this._onSortChanged);
            this._updateSort();
        }

        _updateSort() {
            const s = this.params.column.getSort();
            this.sortEl.textContent = s === 'asc' ? '↑' : s === 'desc' ? '↓' : '';
        }

        getGui()  { return this.eGui; }

        destroy() {
            this.params.column.removeEventListener('sortChanged', this._onSortChanged);
        }
    }

    // -------------------------------------------------------------------------
    // Pie chart
    // -------------------------------------------------------------------------

    let pieChart = null;

    function showPieChart(colId, displayName) {
        const counts = {};
        grid.forEachNodeAfterFilter(node => {
            if (!node.data) return;
            const val = node.data[colId];
            const key = (val !== null && val !== undefined && val !== '') ? String(val) : '(blank)';
            counts[key] = (counts[key] || 0) + 1;
        });

        const labels = Object.keys(counts);
        if (labels.length === 0) { setStatus('No data in this column.', true); return; }

        document.getElementById('chartTitle').textContent = displayName;
        document.getElementById('chartModal').classList.add('open');

        if (pieChart) { pieChart.destroy(); pieChart = null; }

        const ctx = document.getElementById('pieCanvas').getContext('2d');
        pieChart = new Chart(ctx, {
            type: 'pie',
            data: {
                labels,
                datasets: [{
                    data: labels.map(l => counts[l]),
                    backgroundColor: generateChartColors(labels.length)
                }]
            },
            options: {
                plugins: {
                    legend: { position: 'right', labels: { boxWidth: 14, font: { size: 12 } } }
                }
            }
        });
    }

    function closeChart() {
        document.getElementById('chartModal').classList.remove('open');
        if (pieChart) { pieChart.destroy(); pieChart = null; }
    }

    function onChartOverlayClick(e) {
        if (e.target === document.getElementById('chartModal')) closeChart();
    }

    function generateChartColors(n) {
        const palette = [
            '#4c9aff','#36b37e','#ff5630','#ffab00','#6554c0',
            '#00b8d9','#ff7452','#57d9a3','#998dd9','#79e2f2',
            '#f6c90e','#e84393','#00c7c7','#ff9f43','#a29bfe'
        ];
        return Array.from({ length: n }, (_, i) => palette[i % palette.length]);
    }

    // -------------------------------------------------------------------------
    // ag-Grid setup
    // -------------------------------------------------------------------------

    const gridOptions = {
        columnDefs: [],
        rowData: [],
        defaultColDef: { sortable: true, filter: true, resizable: true, minWidth: 100,
                         headerComponent: PieHeaderComp },
        getRowClass: params => params.data?.operationStatus === 'FAILED' ? 'row-failed' : undefined,
        animateRows: true,
        onRowDataUpdated: updateRowCount,
        onFilterChanged:  updateRowCount,
        onRowClicked: params => {
            if (cacheMode === 'names' && params.data?.cacheName) {
                loadCacheEntries(params.data.cacheName);
            }
        }
    };

    const grid = agGrid.createGrid(document.getElementById('grid'), gridOptions);
    let lastJson = null;
    let opAliases = {};            // opName -> string[]
    let opResponseProcessors = {}; // opName -> string[]

    // Load operations on startup
    fetch('/batch/operations')
        .then(r => r.json())
        .then(body => {
            const select = document.getElementById('operation');
            select.innerHTML = '';
            const ops = body.data || [];
            if (ops.length === 0) {
                select.innerHTML = '<option value="">No operations configured</option>';
                return;
            }
            ops.forEach(op => {
                const opt = document.createElement('option');
                opt.value = op.name;
                opt.textContent = op.name;
                select.appendChild(opt);
                if (op.aliases && op.aliases.length > 0) {
                    opAliases[op.name] = op.aliases;
                }
                if (op.responseProcessors && op.responseProcessors.length > 0) {
                    opResponseProcessors[op.name] = op.responseProcessors;
                }
            });
            select.disabled = false;
            onOperationChange();
        })
        .catch(() => {
            document.getElementById('operation').innerHTML = '<option value="">Failed to load operations</option>';
        });

    function onOperationChange() {
        const name = document.getElementById('operation').value;
        document.getElementById('inputFilePath').value = name ? `C:/work/data/${name}.txt` : '';
        const outPath = document.getElementById('outputFilePath');
        if (name) outPath.value = `C:/work/data/${name}.out`;

        // Populate alias dropdown
        const aliases = opAliases[name] || [];
        const aliasSelect = document.getElementById('alias');
        aliasSelect.innerHTML = '<option value="">-- Select Alias --</option>';
        aliases.forEach(a => {
            const opt = document.createElement('option');
            opt.value = a;
            opt.textContent = a;
            aliasSelect.appendChild(opt);
        });
        document.getElementById('aliasGroup').classList.toggle('hidden', aliases.length === 0);

        // Populate response processor dropdown
        const rps = opResponseProcessors[name] || [];
        const rpSelect = document.getElementById('responseProcessor');
        rpSelect.innerHTML = '<option value="">-- None --</option>';
        rps.forEach(r => {
            const opt = document.createElement('option');
            opt.value = r; opt.textContent = r;
            rpSelect.appendChild(opt);
        });
        document.getElementById('responseProcessorGroup').classList.toggle('hidden', rps.length === 0);
    }

    function onAliasChange() {
        const alias = document.getElementById('alias').value;
        if (alias) runBatch();
    }

    function onInputSourceChange() {
        const src = document.getElementById('inputSource').value;
        document.getElementById('inputFileGroup').classList.toggle('hidden', src !== 'FILE');
        document.getElementById('inputIdsGroup').classList.toggle('hidden', src !== 'REQUEST');
    }

    function onOutputDataChange() {
        const out = document.getElementById('outputData').value;
        document.getElementById('outputFileGroup').classList.toggle('hidden', out !== 'FILE');
    }

    function onExecutionModeChange() {
        const mode = document.getElementById('executionMode').value;
        const requestModeEl = document.getElementById('requestMode');
        if (mode === 'ASYNC') {
            // ASYNC requires WebSocket — lock the transport selector
            requestModeEl.value    = 'WS';
            requestModeEl.disabled = true;
        } else {
            requestModeEl.disabled = false;
        }
    }

    async function runBatch() {
        const operation      = document.getElementById('operation').value;
        const inputSource     = document.getElementById('inputSource').value;
        const inputFilePath   = document.getElementById('inputFilePath').value.trim();
        const requestIdsRaw   = document.getElementById('requestIds').value.trim();
        const outputData      = document.getElementById('outputData').value;
        const outputFilePath  = document.getElementById('outputFilePath').value.trim();
        const inputCount      = document.getElementById('inputCount').value.trim();
        const debugMode       = document.getElementById('debugMode').value;
        const httpThreadCount = document.getElementById('httpThreadCount').value.trim();
        const httpTimeoutMs   = document.getElementById('httpTimeoutMs').value.trim();
        const executionMode   = document.getElementById('executionMode').value;

        if (!operation) { setStatus('Please select an operation.', true); return; }

        if (inputSource === 'FILE' && !inputFilePath) {
            setStatus('Please enter an input file path.', true); return;
        }
        if (inputSource === 'REQUEST' && !requestIdsRaw) {
            setStatus('Please enter at least one ID.', true); return;
        }
        if (outputData === 'FILE' && !outputFilePath) {
            setStatus('Please enter an output file path.', true); return;
        }

        setButtonsDisabled(true);
        document.getElementById('statsBar').style.display = 'none';
        lastJson = null;
        setStatus('Running...');

        // Build JSON body
        const body = { operation, debugMode: parseInt(debugMode) };

        if (inputSource === 'FILE') {
            body.inputSource   = 'FILE';
            body.inputFilePath = inputFilePath;
        } else {
            // Parse textarea as CSV (header on first line, data rows below).
            // Delimiter auto-detection: comma if header splits into >1 token, else pipe.
            const lines = requestIdsRaw
                .split(/\r?\n/)
                .map(s => s.trim())
                .filter(s => s.length > 0);

            if (lines.length === 0) {
                setStatus('Please enter at least one row.', true);
                setButtonsDisabled(false);
                return;
            }

            const headerLine   = lines[0];
            const commaTokens  = headerLine.split(',');
            const delimiter    = commaTokens.length > 1 ? ',' : '|';
            const headers      = (delimiter === ',' ? commaTokens : headerLine.split('|'))
                                    .map(h => h.trim());

            const raw = lines.slice(1).map(line => {
                const values = (delimiter === ',' ? line.split(',') : line.split('|'));
                const row = {};
                headers.forEach((h, i) => { row[h] = (values[i] || '').trim(); });
                return row;
            });

            // If only one column and no data rows yet, fall back to single-id mode
            body.inputSource = 'REQUEST';
            if (raw.length > 0) {
                body.raw = raw;
            } else {
                // Header-only — treat header tokens as IDs
                body.ids = headers;
            }
        }

        if (outputData === 'FILE') {
            body.outputData      = 'FILE';
            body.outputFilePath  = outputFilePath;
        }

        if (inputCount)      body.inputCount      = parseInt(inputCount);
        if (httpThreadCount) body.httpThreadCount  = parseInt(httpThreadCount);
        if (httpTimeoutMs)   body.httpTimeoutMs    = parseInt(httpTimeoutMs);
        if (executionMode === 'ASYNC') body.executionMode = 'ASYNC';

        const aliasVal = document.getElementById('alias').value;
        if (aliasVal) body.alias = aliasVal;

        const rpVal = document.getElementById('responseProcessor').value;
        if (rpVal) body.responseProcessor = rpVal;

        // Show the request JSON before sending
        const bodyJson = JSON.stringify(body, null, 2);
        showRequestPreview(bodyJson);

        if (executionMode === 'ASYNC') {
            runBatchAsync(bodyJson);   // fire-and-forget; streams rows back via WS
        } else {
            try {
                const data = await sendRequest(bodyJson);
                lastJson = data;
                handleResponse(data);
            } catch (err) {
                setStatus(`Error: ${err.message}`, true);
            } finally {
                setButtonsDisabled(false);
            }
        }
    }

    // -------------------------------------------------------------------------
    // Shared response renderer — used by runBatch() and sendRawRequest()
    // -------------------------------------------------------------------------

    function handleResponse(data) {
        if (data.error) {
            setStatus(data.message || 'Request failed', true);
            return;
        }

        // File output — no grid data, just show summary
        if (data.outputFile) {
            setStatus(`Results written to: ${data.outputFile}`);
            const meta = data.metadata || {};
            const s    = meta.summary  || {};
            document.getElementById('statTimestamp').textContent    = meta.timestamp || '—';
            document.getElementById('statUuid').textContent         = meta.batchUuid || '—';
            document.getElementById('statTimeTaken').textContent    = (s.timeTakenMs    ?? '—') + ' ms';
            document.getElementById('statResponseSize').textContent = (s.responseSizeKb ?? '—') + ' KB';
            document.getElementById('statMethod').textContent       = '—';
            document.getElementById('statThreadCount').textContent  = '—';
            document.getElementById('statMin').textContent          = '—';
            document.getElementById('statAvg').textContent          = '—';
            document.getElementById('statMax').textContent          = '—';
            document.getElementById('statsBar').style.display = 'flex';
            document.getElementById('copyJsonBtn').disabled = false;
            document.getElementById('clearBtn').disabled    = false;
            return;
        }

        const rows = data.data || [];
        const meta = data.metadata || {};

        if (rows.length === 0) {
            setStatus('No results returned.');
            grid.setGridOption('columnDefs', []);
            grid.setGridOption('rowData', []);
            return;
        }

        if (data.columns && data.columns.length > 0) {
            grid.setGridOption('columnDefs', data.columns.map(c => ({
                field: c.columnName, headerName: c.displayName
            })));
        } else {
            grid.setGridOption('columnDefs', Object.keys(rows[0]).map(k => ({ field: k, headerName: k })));
        }

        grid.setGridOption('rowData', rows);
        grid.sizeColumnsToFit();

        document.getElementById('exportBtn').disabled   = false;
        document.getElementById('expandBtn').disabled   = false;
        document.getElementById('shrinkBtn').disabled   = false;
        document.getElementById('copyJsonBtn').disabled = false;
        document.getElementById('clearBtn').disabled    = false;

        const { httpStats, summary = {} } = meta;
        const { processed = 0, succeeded = 0, failed = 0 } = summary;
        setStatus(`Processed: ${processed} — Succeeded: ${succeeded} — Failed: ${failed}`);

        document.getElementById('statTimestamp').textContent    = meta.timestamp || '—';
        document.getElementById('statUuid').textContent         = meta.batchUuid  || '—';
        document.getElementById('statTimeTaken').textContent    = (summary.timeTakenMs    ?? '—') + ' ms';
        document.getElementById('statResponseSize').textContent = (summary.responseSizeKb ?? '—') + ' KB';
        if (httpStats) {
            document.getElementById('statMethod').textContent      = httpStats.method      || '—';
            document.getElementById('statThreadCount').textContent = httpStats.threadCount ?? '—';
            document.getElementById('statMin').textContent         = httpStats.minMs  + ' ms';
            document.getElementById('statAvg').textContent         = Math.round(httpStats.avgMs) + ' ms';
            document.getElementById('statMax').textContent         = httpStats.maxMs  + ' ms';
        }
        document.getElementById('statsBar').style.display = 'flex';
    }

    // -------------------------------------------------------------------------
    // Persistent WebSocket — one connection for the lifetime of the page
    // -------------------------------------------------------------------------

    let socket           = null;   // the persistent WebSocket
    let wsPending        = null;   // { resolve, reject } for the in-flight SYNC request
    let wsStreamHandler  = null;   // function(msg) — set during ASYNC run, cleared on done/error
    let wsReconnectTimer = null;

    function wsUrl() {
        const proto = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        return `${proto}//${window.location.host}/batch/ws`;
    }

    function wsConnect() {
        if (wsReconnectTimer) { clearTimeout(wsReconnectTimer); wsReconnectTimer = null; }
        setWsIndicator('connecting');
        socket = new WebSocket(wsUrl());

        socket.onopen = () => setWsIndicator('connected');

        socket.onmessage = e => {
            let msg;
            try { msg = JSON.parse(e.data); } catch { return; }

            // ASYNC streaming messages are dispatched to the stream handler
            if (wsStreamHandler && msg.type) {
                wsStreamHandler(msg);
                return;
            }

            // SYNC request/response
            if (!wsPending) return;
            const { resolve, reject } = wsPending;
            wsPending = null;
            if (msg.error) reject(new Error(msg.message || 'WebSocket error response'));
            else           resolve(msg);
        };

        socket.onerror = () => {
            setWsIndicator('error');
            if (wsPending) { const { reject } = wsPending; wsPending = null; reject(new Error('WebSocket error')); }
            if (wsStreamHandler) {
                wsStreamHandler({ type: 'error', message: 'WebSocket error' });
                wsStreamHandler = null;
            }
        };

        socket.onclose = e => {
            setWsIndicator('disconnected');
            if (wsPending) {
                const { reject } = wsPending;
                wsPending = null;
                reject(new Error(`WebSocket closed (code ${e.code})`));
            }
            if (wsStreamHandler) {
                wsStreamHandler({ type: 'error', message: `WebSocket closed (code ${e.code})` });
                wsStreamHandler = null;
            }
            // Auto-reconnect (skip if page is being unloaded)
            wsReconnectTimer = setTimeout(wsConnect, 2000);
        };
    }

    function setWsIndicator(state) {
        const el = document.getElementById('wsIndicator');
        const map = {
            connecting:   { color: '#ffab00', text: '● Connecting…' },
            connected:    { color: '#36b37e', text: '● Connected'   },
            disconnected: { color: '#de350b', text: '● Disconnected'},
            error:        { color: '#de350b', text: '● Error'       }
        };
        const s = map[state] || { color: '#a5adba', text: '' };
        el.style.color   = s.color;
        el.textContent   = s.text;
    }

    function sendViaWs(bodyJson) {
        return new Promise((resolve, reject) => {
            if (!socket || socket.readyState !== WebSocket.OPEN) {
                reject(new Error('WebSocket is not connected — please wait and retry'));
                return;
            }
            if (wsPending) {
                reject(new Error('A WebSocket request is already in flight'));
                return;
            }
            wsPending = { resolve, reject };
            socket.send(bodyJson);
        });
    }

    // Connect immediately on page load
    wsConnect();

    // -------------------------------------------------------------------------
    // ASYNC batch — streams rows into the grid as they arrive
    // -------------------------------------------------------------------------

    function runBatchAsync(bodyJson) {
        if (!socket || socket.readyState !== WebSocket.OPEN) {
            setStatus('WebSocket is not connected — please wait and retry.', true);
            setButtonsDisabled(false);
            return;
        }
        if (wsStreamHandler) {
            setStatus('An ASYNC batch is already in progress.', true);
            setButtonsDisabled(false);
            return;
        }

        let rowCount    = 0;
        let asyncUuid   = null;
        let colsApplied = false;

        // Clear the grid and prepare for streaming
        grid.setGridOption('columnDefs', []);
        grid.setGridOption('rowData', []);
        document.getElementById('statsBar').style.display = 'none';
        document.getElementById('exportBtn').disabled  = true;
        document.getElementById('expandBtn').disabled  = true;
        document.getElementById('shrinkBtn').disabled  = true;
        document.getElementById('copyJsonBtn').disabled = true;
        document.getElementById('clearBtn').disabled   = true;

        wsStreamHandler = msg => {
            switch (msg.type) {

                case 'ack':
                    asyncUuid = msg.batchUuid;
                    setStatus(`${msg.message}`);
                    break;

                case 'row': {
                    const row = msg.row || {};
                    // Apply column defs from the first row we see
                    if (!colsApplied) {
                        colsApplied = true;
                        grid.setGridOption('columnDefs',
                            Object.keys(row).map(k => ({ field: k, headerName: k })));
                    }
                    appendRowToGrid(row);
                    rowCount++;
                    setStatus(`Receiving… ${rowCount} row(s) so far`);
                    break;
                }

                case 'done': {
                    wsStreamHandler = null;
                    setButtonsDisabled(false);

                    const meta = msg.metadata || {};
                    const cols = msg.columns  || [];

                    // Replace auto-derived column defs with the server's typed defs if available
                    if (cols.length > 0) {
                        grid.setGridOption('columnDefs',
                            cols.map(c => ({ field: c.columnName, headerName: c.displayName })));
                    }
                    grid.sizeColumnsToFit();

                    document.getElementById('exportBtn').disabled   = false;
                    document.getElementById('expandBtn').disabled   = false;
                    document.getElementById('shrinkBtn').disabled   = false;
                    document.getElementById('copyJsonBtn').disabled = false;
                    document.getElementById('clearBtn').disabled    = false;

                    setStatus(`Processed: ${meta.processed ?? rowCount} — Succeeded: ${meta.succeeded ?? '?'} — Failed: ${meta.failed ?? '?'}`);

                    document.getElementById('statTimestamp').textContent    = meta.timestamp      || '—';
                    document.getElementById('statUuid').textContent         = meta.batchUuid      || asyncUuid || '—';
                    document.getElementById('statTimeTaken').textContent    = (meta.timeTakenMs    ?? '—') + ' ms';
                    document.getElementById('statResponseSize').textContent = (meta.responseSizeKb ?? '—') + ' KB';
                    document.getElementById('statMethod').textContent       = '—';
                    document.getElementById('statThreadCount').textContent  = meta.threadCount ?? '—';
                    document.getElementById('statMin').textContent          = '—';
                    document.getElementById('statAvg').textContent          = '—';
                    document.getElementById('statMax').textContent          = '—';
                    document.getElementById('statsBar').style.display = 'flex';
                    break;
                }

                case 'error':
                    wsStreamHandler = null;
                    setButtonsDisabled(false);
                    setStatus(`ASYNC error: ${msg.message}`, true);
                    break;

                default:
                    break;
            }
        };

        socket.send(bodyJson);
    }

    /** Appends a single row to the grid without replacing existing rows. */
    function appendRowToGrid(row) {
        grid.applyTransaction({ add: [row] });
    }

    // -------------------------------------------------------------------------
    // Unified request dispatcher
    // -------------------------------------------------------------------------

    async function sendRequest(bodyJson) {
        const mode = document.getElementById('requestMode').value;
        if (mode === 'WS') return sendViaWs(bodyJson);
        const response = await fetch('/batch/run', {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body:    bodyJson
        });
        const data = await response.json();
        if (!response.ok) throw Object.assign(
            new Error(data.message || `HTTP ${response.status}`), { data });
        return data;
    }

    // -------------------------------------------------------------------------
    // Request preview helpers
    // -------------------------------------------------------------------------

    function showRequestPreview(json) {
        document.getElementById('requestPreview').value        = json;
        document.getElementById('requestPreview').style.display = 'block';
        document.getElementById('requestPreviewHeader').style.display = 'flex';
    }

    function hideRequestPreview() {
        document.getElementById('requestPreview').style.display        = 'none';
        document.getElementById('requestPreviewHeader').style.display  = 'none';
        document.getElementById('requestPreview').value = '';
    }

    function validateJson() {
        const text = document.getElementById('requestPreview').value.trim();
        if (!text) { setStatus('Request editor is empty.', true); return; }
        try {
            JSON.parse(text);
            setStatus('JSON is valid.', false);
        } catch (e) {
            setStatus(`Invalid JSON: ${e.message}`, true);
        }
    }

    async function sendRawRequest() {
        const text = document.getElementById('requestPreview').value.trim();
        if (!text) { setStatus('Request editor is empty.', true); return; }
        try { JSON.parse(text); } catch (e) {
            setStatus(`Fix JSON before sending: ${e.message}`, true);
            return;
        }
        setButtonsDisabled(true);
        setStatus('Sending…');
        try {
            const data = await sendRequest(text);
            lastJson = data;
            handleResponse(data);
        } catch (err) {
            setStatus(`Error: ${err.message}`, true);
        } finally {
            setButtonsDisabled(false);
        }
    }

    function setButtonsDisabled(disabled) {
        // Only lock the Run button while a request is in flight.
        // The result buttons are enabled/disabled by the success and clear paths.
        document.getElementById('runBtn').disabled = disabled;
    }

    function expandColumns()  { grid.autoSizeAllColumns(); }
    function shrinkColumns()  { grid.sizeColumnsToFit(); }

    async function copyJson() {
        if (!lastJson) return;
        await navigator.clipboard.writeText(JSON.stringify(lastJson, null, 2));
        const btn = document.getElementById('copyJsonBtn');
        const orig = btn.textContent;
        btn.textContent = 'Copied!';
        setTimeout(() => btn.textContent = orig, 1500);
    }

    function clearGrid() {
        grid.setGridOption('rowData', []);
        grid.setGridOption('columnDefs', []);
        hideRequestPreview();
        lastJson = null;
        ['statMethod','statThreadCount','statTimestamp','statUuid',
         'statTimeTaken','statResponseSize','statMin','statAvg','statMax']
            .forEach(id => document.getElementById(id).textContent = '—');
        document.getElementById('statsBar').style.display = 'none';
        document.getElementById('rowCountBar').textContent = '';
        hideCacheModeBar();
        document.getElementById('exportBtn').disabled    = true;
        document.getElementById('expandBtn').disabled    = true;
        document.getElementById('shrinkBtn').disabled    = true;
        document.getElementById('copyJsonBtn').disabled  = true;
        document.getElementById('clearBtn').disabled     = true;
        setStatus('');
    }

    async function showAllOperations() {
        setStatus('Loading operations...');
        document.getElementById('statsBar').style.display = 'none';
        try {
            const response = await fetch('/batch/operations');
            const body = await response.json();
            const rows = body.data || [];
            if (rows.length === 0) {
                setStatus('No operations configured.');
                grid.setGridOption('columnDefs', []);
                grid.setGridOption('rowData', []);
                return;
            }
            grid.setGridOption('columnDefs', Object.keys(rows[0]).map(k => ({ field: k, headerName: k })));
            grid.setGridOption('rowData', rows);
            grid.autoSizeAllColumns();
            lastJson = body;
            document.getElementById('exportBtn').disabled    = false;
            document.getElementById('expandBtn').disabled    = false;
            document.getElementById('shrinkBtn').disabled    = false;
            document.getElementById('copyJsonBtn').disabled  = false;
            document.getElementById('clearBtn').disabled     = false;
            setStatus(`Showing ${rows.length} operation(s).`);
        } catch (err) {
            setStatus(`Error: ${err.message}`, true);
        }
    }

    function exportCsv() { grid.exportDataAsCsv({ fileName: 'batch-results.csv' }); }

    // -------------------------------------------------------------------------
    // Cache UI
    // -------------------------------------------------------------------------

    let cacheMode         = null;   // null | 'names' | 'entries'
    let selectedCacheName = null;

    async function loadCacheNames() {
        cacheMode = 'names';
        selectedCacheName = null;
        setStatus('Loading caches…');
        document.getElementById('statsBar').style.display = 'none';
        try {
            const res  = await fetch('/batch/cache');
            const body = await res.json();
            const rows = body.data || [];
            grid.setGridOption('columnDefs', rows.length > 0
                ? Object.keys(rows[0]).map(k => ({ field: k, headerName: k }))
                : []);
            grid.setGridOption('rowData', rows);
            grid.autoSizeAllColumns();
            lastJson = body;
            document.getElementById('exportBtn').disabled   = false;
            document.getElementById('expandBtn').disabled   = false;
            document.getElementById('shrinkBtn').disabled   = false;
            document.getElementById('copyJsonBtn').disabled = false;
            document.getElementById('clearBtn').disabled    = false;
            showCacheModeBar(`${rows.length} cache(s) — click a row to view entries`, false);
            setStatus('');
        } catch (err) {
            setStatus(`Error loading caches: ${err.message}`, true);
        }
    }

    async function loadCacheEntries(name) {
        cacheMode         = 'entries';
        selectedCacheName = name;
        setStatus(`Loading entries for cache "${name}"…`);
        try {
            const res  = await fetch(`/batch/cache/${encodeURIComponent(name)}`);
            const body = await res.json();
            const rows = body.data || [];
            grid.setGridOption('columnDefs', rows.length > 0
                ? Object.keys(rows[0]).map(k => ({ field: k, headerName: k }))
                : [{ field: 'info', headerName: 'Info' }]);
            grid.setGridOption('rowData', rows.length > 0 ? rows : [{ info: '(cache is empty)' }]);
            grid.autoSizeAllColumns();
            lastJson = body;
            showCacheModeBar(`Cache: "${name}" — ${rows.length} entry(s)`, true);
            setStatus('');
        } catch (err) {
            setStatus(`Error loading cache entries: ${err.message}`, true);
        }
    }

    async function clearSelectedCache() {
        if (!selectedCacheName) return;
        const name = selectedCacheName;
        try {
            const res  = await fetch(`/batch/cache/${encodeURIComponent(name)}`, { method: 'DELETE' });
            const body = await res.json();
            lastJson   = body;
            await loadCacheEntries(name);   // reload — will show empty
            setStatus(`Cache "${name}" cleared.`);
        } catch (err) {
            setStatus(`Error clearing cache: ${err.message}`, true);
        }
    }

    function showCacheModeBar(label, showClearAndBack) {
        document.getElementById('cacheModeLabel').textContent = label;
        document.getElementById('clearCacheBtn').style.display   = showClearAndBack ? '' : 'none';
        document.getElementById('backToCachesBtn').style.display = showClearAndBack ? '' : 'none';
        document.getElementById('cacheModeBar').style.display = 'flex';
    }

    function hideCacheModeBar() {
        document.getElementById('cacheModeBar').style.display = 'none';
        cacheMode = null;
        selectedCacheName = null;
    }

    function updateRowCount() {
        const total    = grid.getDisplayedRowCount();
        const bar      = document.getElementById('rowCountBar');
        if (total === 0) { bar.textContent = ''; return; }
        bar.textContent = `Rows: ${total}`;
    }

    function setStatus(msg, isError = false) {
        const bar = document.getElementById('statusBar');
        bar.textContent = msg;
        bar.className = 'status-bar' + (isError ? ' error' : '');
    }
</script>

</body>
