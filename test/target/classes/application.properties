spring.application.name=demo

# --- Batch configuration ---
# HTTP method: GET or POST
batch.http.method=GET
# URL of the HTTP endpoint; {id} is replaced with the identifier.
#   GET example:  http://example.com/api/lookup?id={id}
#   POST example: http://example.com/api/lookup
batch.http.url=https://eutils.ncbi.nlm.nih.gov/entrez/eutils/efetch.fcgi?db=pubmed&id={id}&retmode=xml
# Content-Type header (POST only)
batch.http.content-type=text/xml
# Request body template (POST only); {id} is replaced with the identifier
batch.http.body-template=<request><id>{id}</id></request>
# Max simultaneous HTTP POST calls
batch.http.thread-count=1
# Max simultaneous XPath evaluations per response
batch.xpath.thread-count=10
# Path to the XPath definitions file (classpath: or absolute file path)
batch.xpath.config=classpath:xpaths.json
# Directory where one output JSON file per identifier is written
batch.output.dir=C:\\work\\data
