name: Publish to GitHub Packages

on:
  push:
    branches: [ main ]
    paths:
      - 'batchworkflow/**'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Write Maven settings
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml << 'EOF'
          <settings>
            <servers>
              <server>
                <id>github</id>
                <username>mohanmu82</username>
                <password>${env.GITHUB_TOKEN}</password>
              </server>
            </servers>
          </settings>
          EOF

      - name: Build and publish
        working-directory: batchworkflow
        run: |
          mvn --batch-mode deploy -DskipTests \
            -Dmaven.wagon.http.pool=false \
            -DaltSnapshotDeploymentRepository=github::https://maven.pkg.github.com/mohanmu82/workspace
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
